version: '3.8'

# Использование: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Перед запуском собери фронтенд: npm run build

services:
  nginx:
    volumes:
      - ./:/app
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf

  # Node в prod не нужен для nginx — только для сборки
  # Запусти вручную если нужно: docker compose run --rm node npm run build
  node:
    build:
      context: .
      dockerfile: ./docker/node/Dockerfile
    container_name: node_6stk42
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    networks:
      - app-network
    profiles:
      - build
