version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: php_nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php-fpm
    networks:
      - app-network
    restart: unless-stopped

  php-fpm:
    image: php:8.2-fpm-alpine
    container_name: php_fpm
    volumes:
      - ./:/app
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge